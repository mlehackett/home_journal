<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Chore Log">
<title>Home Chore Log</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F0F7F7;
    --surface: #FAFEFE;
    --surface2: #DFF0F0;
    --ink: #0F2830;
    --ink2: #4A7178;
    --accent: #1A9DAA;
    --accent2: #5ECFDB;
    --green: #2E7D52;
    --green-light: #D4EAD8;
    --red: #C0392B;
    --border: #C0DDE0;
    --radius: 16px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  .app-header {
    background: var(--ink);
    color: var(--bg);
    padding: calc(var(--safe-top) + 18px) 20px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .app-title { font-family: 'DM Serif Display', serif; font-size: 22px; letter-spacing: -0.3px; flex: 1; }
  .app-title span { color: var(--accent2); font-style: italic; }

  .user-picker { display: flex; gap: 6px; align-items: center; }

  .user-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 600;
    padding: 6px 12px;
    border-radius: 20px;
    border: 1.5px solid rgba(255,255,255,0.25);
    background: transparent;
    color: rgba(255,255,255,0.6);
    cursor: pointer; transition: all 0.2s; letter-spacing: 0.5px;
  }
  .user-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

  .tab-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; padding: 0 16px;
    overflow-x: auto; scrollbar-width: none;
  }
  .tab-bar::-webkit-scrollbar { display: none; }

  .tab-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 500;
    padding: 13px 18px;
    border: none; background: transparent; color: var(--ink2);
    cursor: pointer;
    border-bottom: 2.5px solid transparent;
    white-space: nowrap; transition: all 0.2s; margin-bottom: -1px;
  }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

  .tab-content {
    flex: 1; display: none; flex-direction: column;
    padding: 20px 16px calc(var(--safe-bottom) + 20px);
    gap: 12px; max-width: 600px; width: 100%; margin: 0 auto;
  }
  .tab-content.active { display: flex; }

  .status-bar {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 10px 14px;
    font-size: 13px; color: var(--ink2);
    display: flex; align-items: center; gap: 8px; min-height: 40px;
  }

  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--border); flex-shrink: 0; transition: background 0.3s;
  }
  .status-dot.loading { background: var(--accent2); animation: pulse 1s infinite; }
  .status-dot.ok { background: var(--green); }
  .status-dot.error { background: var(--red); }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .section-label {
    font-size: 11px; font-weight: 600; letter-spacing: 1.2px;
    text-transform: uppercase; color: var(--ink2); padding: 0 2px;
  }

  /* CHORE CARD */
  .chore-card {
    display: flex; flex-direction: column;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--surface);
    transition: border-color 0.2s, background 0.2s;
  }
  .chore-card.logging { border-color: var(--accent2); background: #F0FBFC; }
  .chore-card.success { border-color: var(--green); background: var(--green-light); }

  .chore-row {
    padding: 14px 16px;
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
  }

  .chore-name { font-size: 16px; font-weight: 500; color: var(--ink); flex: 1; }
  .chore-tap { font-size: 11px; color: var(--ink2); font-weight: 400; display: block; margin-top: 2px; }

  .chore-action { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

  .qty-control {
    display: flex; align-items: center;
    border: 1.5px solid var(--border); border-radius: 10px;
    overflow: hidden; background: var(--bg);
  }

  .qty-btn {
    width: 32px; height: 32px; border: none; background: transparent;
    font-size: 18px; font-weight: 300; color: var(--ink); cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: background 0.15s;
  }
  .qty-btn:active { background: var(--surface2); }

  .qty-val {
    min-width: 26px; text-align: center;
    font-size: 14px; font-weight: 600; color: var(--ink); pointer-events: none;
  }

  .log-icon {
    width: 34px; height: 34px; border-radius: 10px;
    background: var(--accent); color: white;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    flex-shrink: 0; user-select: none;
  }
  .log-icon:active { transform: scale(0.93); }
  .chore-card.success .log-icon { background: var(--green); }

  .hist-toggle {
    width: 34px; height: 34px; border-radius: 10px;
    border: 1.5px solid var(--border); background: var(--bg); color: var(--ink2);
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; cursor: pointer; transition: all 0.2s;
    flex-shrink: 0; user-select: none;
  }
  .hist-toggle.open { background: var(--ink); border-color: var(--ink); color: var(--bg); }

  /* INLINE HISTORY PANEL */
  .chore-history {
    display: none; flex-direction: column;
    border-top: 1px solid var(--border); background: var(--bg);
  }
  .chore-history.open { display: flex; }

  .hist-loading {
    padding: 12px 16px; font-size: 13px; color: var(--ink2);
    display: flex; align-items: center; gap: 8px;
  }

  .hist-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
  }
  .hist-item:last-child { border-bottom: none; }

  .hist-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent2); flex-shrink: 0; }

  .hist-date { flex: 1; font-size: 13px; color: var(--ink2); }

  .hist-user {
    font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
    padding: 2px 7px; border-radius: 20px;
    background: var(--ink); color: var(--bg);
  }

  .hist-val {
    font-size: 13px; font-weight: 600; color: var(--ink2);
    background: var(--surface2); padding: 2px 8px;
    border-radius: 20px; min-width: 28px; text-align: center;
  }

  .hist-empty { padding: 14px 16px; font-size: 13px; color: var(--ink2); font-style: italic; }

  /* OTHER CHORE */
  .other-section {
    background: var(--surface); border: 1.5px dashed var(--border);
    border-radius: var(--radius); padding: 16px 18px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .other-label { font-size: 13px; font-weight: 600; color: var(--ink2); }
  .other-row { display: flex; gap: 8px; align-items: center; }

  .other-input {
    flex: 1; font-family: 'DM Sans', sans-serif; font-size: 15px;
    padding: 10px 14px; border: 1.5px solid var(--border);
    border-radius: 10px; background: var(--bg); color: var(--ink);
    outline: none; transition: border-color 0.2s;
  }
  .other-input:focus { border-color: var(--accent); }
  .other-input::placeholder { color: var(--ink2); opacity: 0.6; }

  .other-submit {
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600;
    padding: 10px 16px; border-radius: 10px; border: none;
    background: var(--accent); color: white; cursor: pointer;
    transition: background 0.2s; white-space: nowrap;
  }
  .other-submit:active { background: #147a85; }
  .other-submit:disabled { background: var(--border); color: var(--ink2); }

  /* SETTINGS */
  .settings-group { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .settings-row { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 6px; }
  .settings-row:last-child { border-bottom: none; }
  .settings-label { font-size: 12px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; color: var(--ink2); }
  .settings-val { font-size: 14px; color: var(--ink); background: var(--bg); padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border); word-break: break-all; }
  .settings-note { font-size: 13px; color: var(--ink2); line-height: 1.5; padding: 12px 16px; background: var(--green-light); border-top: 1px solid var(--border); }

  .empty-state { text-align: center; padding: 30px 20px; color: var(--ink2); font-size: 15px; }
  .spin { animation: spin 1s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header class="app-header">
  <div class="app-title">Home <span>Chore</span> Log</div>
  <div class="user-picker">
    <button class="user-btn active" data-user="MLE" onclick="setUser('MLE')">MLE</button>
    <button class="user-btn" data-user="CYD" onclick="setUser('CYD')">CYD</button>
  </div>
</header>

<nav class="tab-bar">
  <button class="tab-btn active" onclick="showTab('log',event)">Log Chore</button>
  <button class="tab-btn" onclick="showTab('settings',event)">Settings</button>
</nav>

<!-- LOG TAB -->
<div class="tab-content active" id="tab-log">
  <div class="status-bar">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">Loading chores…</span>
  </div>
  <div class="section-label">Chores</div>
  <div id="chore-grid" style="display:flex;flex-direction:column;gap:8px;"></div>
  <div class="other-section">
    <div class="other-label">➕ Add &amp; Log Other Chore</div>
    <div class="other-row">
      <input class="other-input" id="other-input" type="text" placeholder="e.g. Vacuum living room" autocomplete="off" autocapitalize="words">
      <button class="other-submit" id="other-submit" onclick="logOther()">Log It</button>
    </div>
  </div>
</div>

<!-- SETTINGS TAB -->
<div class="tab-content" id="tab-settings">
  <div class="section-label">Adafruit IO Config</div>
  <div class="settings-group">
    <div class="settings-row">
      <div class="settings-label">Username</div>
      <div class="settings-val" id="s-username"></div>
    </div>
    <div class="settings-row">
      <div class="settings-label">API Key</div>
      <div class="settings-val" id="s-apikey"></div>
    </div>
    <div class="settings-row">
      <div class="settings-label">Feed Group</div>
      <div class="settings-val" id="s-group"></div>
    </div>
    <div class="settings-note">Credentials are baked into this file. To update them, edit the JS config at the top of the HTML source.</div>
  </div>
  <div class="section-label" style="margin-top:8px">Users</div>
  <div class="settings-group">
    <div class="settings-row">
      <div class="settings-label">Logged Users</div>
      <div class="settings-val">MLE &amp; CYD</div>
    </div>
  </div>
</div>

<script>
const AIO_USERNAME   = "mlehackett";
const AIO_KEY        = "aio_chwo240uRKqeH5Ogi31jeKFewkZp";
const FEED_GROUP     = "home-chore-log";
const GROUP_LABEL    = "home_chore_log";
const QUANTITY_FEEDS = ["bags_of_salt"];

const AIO_BASE = `https://io.adafruit.com/api/v2/${AIO_USERNAME}`;
const HEADERS  = { "X-AIO-Key": AIO_KEY, "Content-Type": "application/json" };

let currentUser = "MLE";
let choreFeeds  = [];

document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("s-username").textContent = AIO_USERNAME;
  document.getElementById("s-apikey").textContent   = AIO_KEY;
  document.getElementById("s-group").textContent    = GROUP_LABEL;
  loadFeeds();
});

function setUser(u) {
  currentUser = u;
  document.querySelectorAll(".user-btn").forEach(b => b.classList.toggle("active", b.dataset.user === u));
}

function showTab(name, e) {
  document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("tab-" + name).classList.add("active");
  if (e && e.currentTarget) e.currentTarget.classList.add("active");
}

// Only first word capitalized: "bags_of_salt" → "Bags of salt"
function feedKeyToDisplay(key) {
  const words = key.split("_");
  words[0] = words[0].charAt(0).toUpperCase() + words[0].slice(1);
  return words.join(" ");
}

function displayToFeedKey(name) {
  return name.trim().toLowerCase().replace(/\s+/g, "_").replace(/[^a-z0-9_]/g, "");
}

// ── VALUE ENCODING ────────────────────────────────────────────────────────────
// Values are stored as "USER:quantity" e.g. "MLE:1" or "CYD:4"
// Legacy values without a colon are treated as having no user.
function encodeValue(user, quantity) {
  return `${user}:${quantity}`;
}

function decodeValue(raw) {
  if (!raw) return { user: "—", quantity: "?" };
  const colon = raw.indexOf(":");
  if (colon === -1) return { user: "—", quantity: raw };
  return {
    user: raw.substring(0, colon),
    quantity: raw.substring(colon + 1)
  };
}

async function loadFeeds() {
  setStatus("loading", "Loading chores from Adafruit IO…");
  try {
    const res = await fetch(`${AIO_BASE}/groups/${FEED_GROUP}`, { headers: HEADERS });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    choreFeeds = (data.feeds || []).map(f => {
      const shortKey = f.key.split(".").pop().replace(/-/g, "_");
      return { key: f.key, shortKey, displayName: feedKeyToDisplay(shortKey),
               isQty: QUANTITY_FEEDS.includes(shortKey), qty: 3, histOpen: false };
    });

    setStatus("ok", choreFeeds.length === 0
      ? "No feeds found yet. Add one below!"
      : `${choreFeeds.length} chore${choreFeeds.length !== 1 ? "s" : ""} loaded.`);
    renderChores();
  } catch (e) {
    setStatus("error", "Could not load feeds: " + e.message);
  }
}

function renderChores() {
  const grid = document.getElementById("chore-grid");
  grid.innerHTML = "";

  if (choreFeeds.length === 0) {
    grid.innerHTML = `<div class="empty-state">No chores yet — add one below!</div>`;
    return;
  }

  choreFeeds.forEach((chore, i) => {
    const card = document.createElement("div");
    card.className = "chore-card";
    card.id = `card-${i}`;

    const qtyHtml = chore.isQty ? `
      <div class="qty-control" onclick="event.stopPropagation()">
        <button class="qty-btn" onclick="changeQty(${i},-1)">−</button>
        <span class="qty-val" id="qty-${i}">${chore.qty}</span>
        <button class="qty-btn" onclick="changeQty(${i},1)">+</button>
      </div>` : "";

    const tapHint = chore.isQty ? "Set qty, then tap ✓" : "Tap to log";

    card.innerHTML = `
      <div class="chore-row">
        <div style="flex:1;cursor:${chore.isQty ? 'default' : 'pointer'}" onclick="${chore.isQty ? '' : `logChore(${i})`}">
          <div class="chore-name">${chore.displayName}</div>
          <span class="chore-tap">${tapHint}</span>
        </div>
        <div class="chore-action">
          ${qtyHtml}
          <div class="log-icon" id="logbtn-${i}" onclick="logChore(${i})">✓</div>
          <div class="hist-toggle" id="histbtn-${i}" onclick="toggleHistory(${i})" title="History">≡</div>
        </div>
      </div>
      <div class="chore-history" id="hist-${i}"></div>`;

    grid.appendChild(card);
  });
}

function changeQty(i, delta) {
  choreFeeds[i].qty = Math.max(1, choreFeeds[i].qty + delta);
  document.getElementById(`qty-${i}`).textContent = choreFeeds[i].qty;
}

async function logChore(i) {
  const chore = choreFeeds[i];
  const card  = document.getElementById(`card-${i}`);
  if (card.classList.contains("logging")) return;

  card.classList.add("logging");
  const quantity = chore.isQty ? chore.qty : 1;
  const value    = encodeValue(currentUser, quantity);

  try {
    const res = await fetch(`${AIO_BASE}/feeds/${chore.key}/data`, {
      method: "POST", headers: HEADERS,
      body: JSON.stringify({ value })
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    card.classList.remove("logging");
    card.classList.add("success");
    setStatus("ok", `Logged: ${chore.displayName} (${quantity}) by ${currentUser}`);
    setTimeout(() => card.classList.remove("success"), 2000);
    if (chore.histOpen) fetchHistory(i);
  } catch (e) {
    card.classList.remove("logging");
    setStatus("error", "Failed to log: " + e.message);
  }
}

function toggleHistory(i) {
  const chore = choreFeeds[i];
  const panel = document.getElementById(`hist-${i}`);
  const btn   = document.getElementById(`histbtn-${i}`);
  chore.histOpen = !chore.histOpen;
  panel.classList.toggle("open", chore.histOpen);
  btn.classList.toggle("open", chore.histOpen);
  if (chore.histOpen) fetchHistory(i);
}

async function fetchHistory(i) {
  const chore = choreFeeds[i];
  const panel = document.getElementById(`hist-${i}`);
  panel.innerHTML = `<div class="hist-loading"><span class="spin">↺</span>&nbsp;Loading…</div>`;

  try {
    const res = await fetch(`${AIO_BASE}/feeds/${chore.key}/data?limit=15`, { headers: HEADERS });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const items = await res.json();

    if (!items || items.length === 0) {
      panel.innerHTML = `<div class="hist-empty">No entries yet.</div>`;
      return;
    }

    panel.innerHTML = items.map(item => {
      const { user, quantity } = decodeValue(item.value);
      return `
        <div class="hist-item">
          <div class="hist-dot"></div>
          <div class="hist-date">${formatDate(new Date(item.created_at))}</div>
          ${user !== "—" ? `<span class="hist-user">${user}</span>` : ""}
          <span class="hist-val">${quantity}</span>
        </div>`;
    }).join("");
  } catch (e) {
    panel.innerHTML = `<div class="hist-empty">Error: ${e.message}</div>`;
  }
}

async function logOther() {
  const input = document.getElementById("other-input");
  const name  = input.value.trim();
  if (!name) return;

  const submit = document.getElementById("other-submit");
  submit.disabled = true;
  submit.textContent = "…";

  const shortKey   = displayToFeedKey(name);
  const aioFeedKey = `${FEED_GROUP}.${shortKey.replace(/_/g, "-")}`;

  setStatus("loading", `Creating feed "${name}"…`);

  try {
    const createRes = await fetch(`${AIO_BASE}/groups/${FEED_GROUP}/feeds`, {
      method: "POST", headers: HEADERS,
      body: JSON.stringify({ feed: { name, key: shortKey.replace(/_/g, "-") } })
    });
    if (!createRes.ok && createRes.status !== 422)
      throw new Error(`Create feed HTTP ${createRes.status}`);

    const feedData    = createRes.ok ? await createRes.json() : null;
    const resolvedKey = feedData ? feedData.key : aioFeedKey;

    setStatus("loading", `Logging "${name}"…`);
    const logRes = await fetch(`${AIO_BASE}/feeds/${resolvedKey}/data`, {
      method: "POST", headers: HEADERS,
      body: JSON.stringify({ value: encodeValue(currentUser, 1) })
    });
    if (!logRes.ok) throw new Error(`Log HTTP ${logRes.status}`);

    setStatus("ok", `Logged: ${name} by ${currentUser}. Refreshing list…`);
    input.value = "";
    await loadFeeds();
  } catch (e) {
    setStatus("error", "Error: " + e.message);
  } finally {
    submit.disabled = false;
    submit.textContent = "Log It";
  }
}

function formatDate(d) {
  const diff = Math.floor((Date.now() - d) / 1000);
  if (diff < 60)     return "Just now";
  if (diff < 3600)   return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400)  return `${Math.floor(diff/3600)}h ago`;
  if (diff < 604800) return `${Math.floor(diff/86400)}d ago`;
  return d.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
}

function setStatus(state, msg) {
  document.getElementById("status-dot").className = "status-dot " + state;
  document.getElementById("status-text").textContent = msg;
}
</script>
</body>
</html>
